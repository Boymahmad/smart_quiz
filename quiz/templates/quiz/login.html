{% extends 'quiz/base.html' %}

{% block title %}
Воридшавӣ
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <h2 class="text-center mb-4">Воридшавӣ</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Ворид шудан
                    </button>
                </div>
            </form>

            <p class="mt-3 text-center">
                Ҳоло аккаунт надорӣ?
                <a href="{% url 'quiz:signup' %}">Қайд шудан</a>
            </p>

        </div>
    </div>
</div>
{% endblock %}
